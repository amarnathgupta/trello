<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trello - Board</title>
    <link href="./css/style.css" rel="stylesheet" />
  </head>
  <body class="bg-linear-to-br from-gray-100 to-gray-200 min-h-screen">
    <nav id="navbar"></nav>

    <main class="px-6 py-10">
      <!-- ORG HEADER -->
      <div
        class="flex items-center justify-between mb-8 bg-white p-5 rounded-xl shadow-sm"
      >
        <div class="flex items-center gap-4">
          <!-- Back Button -->
          <button
            onclick="window.location.href = './dashboard.html'"
            class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition active:scale-95 cursor-pointer"
          >
            <span>←</span> Back
          </button>

          <!-- Org Info -->
          <div class="flex items-center gap-2 flex-wrap">
            <h1
              id="orgName"
              class="text-xl font-bold text-gray-800 tracking-tight"
            >
              ?
            </h1>
            <span
              id="orgType"
              class="text-xs font-medium bg-gray-100 text-gray-600 px-2.5 py-1 rounded-full border border-gray-200"
              >—</span
            >
          </div>
        </div>

        <!-- Delete Button -->
        <button
          onclick="openDeleteOrgModal()"
          class="text-sm font-medium text-red-500 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg transition cursor-pointer"
        >
          Delete Org
        </button>
      </div>

      <div class="grid grid-cols-3 gap-6">
        <!-- LEFT: BOARDS (2/3 width) -->
        <div class="col-span-2 p-5 bg-white rounded-xl shadow-sm">
          <h2 class="text-lg font-semibold text-gray-800 mb-3">Boards</h2>

          <div
            id="boardsGrid"
            class="grid grid-cols-1 md:grid-cols-2 gap-5 p-2"
          ></div>
        </div>

        <!-- RIGHT: MEMBERS (1/3 width) -->
        <div class="col-span-1">
          <div class="bg-white rounded-xl shadow-sm p-5">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-base font-semibold text-gray-700">Members</h2>
              <button
                onclick="openAddMemberModal()"
                class="text-xs bg-[#0052CC] hover:bg-[#0041A8] text-white px-3 py-1.5 rounded-lg transition"
              >
                + Add
              </button>
            </div>
            <div id="membersList" class="space-y-2">
              <!-- JS se render hoga -->
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- ADD BOARD MODAL -->
    <div
      id="boardModal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"
    >
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4">
        <h2 class="text-xl font-bold text-gray-800 mb-5">Create Board</h2>
        <div class="mb-6">
          <label
            class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1"
            >Title</label
          >
          <input
            id="boardTitle"
            type="text"
            placeholder="Board title"
            class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#0052CC]"
          />
        </div>
        <div
          id="boardModalError"
          class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2"
        ></div>
        <div class="flex gap-3">
          <button
            onclick="closeBoardModal()"
            class="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition"
          >
            Cancel
          </button>
          <button
            onclick="createBoard()"
            class="flex-1 py-2.5 bg-[#0052CC] hover:bg-[#0041A8] text-white rounded-lg text-sm font-semibold transition"
          >
            Create
          </button>
        </div>
      </div>
    </div>

    <!-- ADD MEMBER MODAL -->
    <div
      id="addMemberModal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"
    >
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4">
        <h2 class="text-xl font-bold text-gray-800 mb-5">Add Member</h2>
        <div class="mb-4">
          <label
            class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1"
            >Username</label
          >
          <input
            id="memberUsername"
            type="text"
            placeholder="member username"
            class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#0052CC]"
          />
        </div>
        <div class="mb-6">
          <label
            class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1"
            >Role</label
          >
          <select
            id="memberRole"
            class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#0052CC] bg-white"
          >
            <option value="member">Member</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div
          id="addMemberError"
          class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2"
        ></div>
        <div class="flex gap-3">
          <button
            onclick="closeAddMemberModal()"
            class="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition"
          >
            Cancel
          </button>
          <button
            onclick="addMember()"
            class="flex-1 py-2.5 bg-[#0052CC] hover:bg-[#0041A8] text-white rounded-lg text-sm font-semibold transition cursor-pointer"
          >
            Add
          </button>
        </div>
      </div>
    </div>

    <!-- DELETE ORG MODAL -->
    <div
      id="deleteOrgModal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"
    >
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4">
        <h2 class="text-xl font-bold text-gray-800 mb-2">
          Delete Organization
        </h2>
        <p class="text-sm text-gray-500 mb-2">
          first delete all boards in this organization
        </p>

        <div
          id="deleteOrgBoardsList"
          class="mb-4 space-y-2 max-h-48 overflow-y-auto"
        ></div>

        <div
          id="deleteOrgError"
          class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2"
        ></div>
        <div
          id="deleteOrgSuccess"
          class="hidden mb-4 text-sm text-green-600 bg-green-50 border border-green-200 rounded-lg px-4 py-2"
        ></div>

        <div class="flex gap-3 mt-4">
          <button
            onclick="closeDeleteOrgModal()"
            class="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition"
          >
            Cancel
          </button>
          <button
            id="deleteOrgBtn"
            onclick="deleteOrg()"
            class="flex-1 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm font-semibold transition"
          >
            Delete Org
          </button>
        </div>
      </div>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/components/navbar.js"></script>
    <script src="./js/board.js"></script>
    <script>
      (async () => {
        const user = await getMe();
        if (!user) window.location.href = "./index.html";
        await loadBoardPage();
      })();

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeBoardModal();
          closeAddMemberModal();
          closeDeleteOrgModal();
        }
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trello Clone</title>
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body
    class="min-h-screen bg-blue-600 flex flex-col items-center justify-center p-8 font-sans"
  >
    <!-- Logo -->
    <div class="mb-8 text-center">
      <div class="flex items-center justify-center gap-2 mb-2">
        <div class="flex gap-1">
          <div class="w-[14px] h-8 bg-white rounded"></div>
          <div class="w-[14px] h-6 bg-white rounded self-end"></div>
        </div>
        <span class="text-white text-2xl font-bold tracking-tight">Trello</span>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-xl w-full max-w-md p-8 shadow-2xl">
      <!-- Tabs -->
      <div class="flex border border-gray-200 rounded-lg overflow-hidden mb-6">
        <button
          id="signinTab"
          class="flex-1 py-2 text-sm font-semibold bg-blue-600 text-white cursor-pointer"
        >
          Sign In
        </button>

        <button
          id="signupTab"
          class="flex-1 py-2 text-sm font-semibold bg-white text-gray-500 cursor-pointer"
        >
          Sign Up
        </button>
      </div>

      <!-- Username -->
      <div class="mb-4">
        <label
          class="block text-xs font-semibold text-gray-700 mb-1 uppercase tracking-wide"
        >
          Username
        </label>
        <input
          id="username"
          type="text"
          placeholder="example123"
          class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label
          class="block text-xs font-semibold text-gray-700 mb-1 uppercase tracking-wide"
        >
          Password
        </label>
        <div class="relative">
          <input
            id="password"
            type="password"
            placeholder="enter your password"
            class="w-full px-3 py-2 pr-10 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />

          <button
            type="button"
            onclick="togglePass()"
            class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 text-lg"
          >
            <span
              class="hover:underline cursor-pointer text-sm"
              id="visibility"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="icon icon-tabler icons-tabler-outline icon-tabler-eye"
              >
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" />
                <path
                  d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6"
                />
              </svg>
            </span>
          </button>
        </div>
      </div>

      <!-- Error -->
      <div
        id="errorMsg"
        class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-3 py-2 mb-4"
      ></div>

      <!-- Button -->
      <button
        id="submitBtn"
        class="w-full py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition mb-4 cursor-pointer"
      >
        <span id="btnText">Sign In</span>
      </button>
    </div>

    <script src="./js/auth.js"></script>
    <script>
      (async () => {
        const user = await getMe();
        if (user) {
          window.location.href = "/dashboard.html";
        }
      })();

      const signinTab = document.getElementById("signinTab");
      const signupTab = document.getElementById("signupTab");

      let mode = "signin";

      function switchTab(tab) {
        mode = tab;
        document.getElementById("errorMsg").classList.add("hidden");

        if (tab === "signin") {
          signinTab.className =
            "flex-1 py-2 text-sm font-semibold bg-blue-600 text-white cursor-pointer";
          signupTab.className =
            "flex-1 py-2 text-sm font-semibold bg-white text-gray-500 cursor-pointer";
          btnText.textContent = "Sign In";
        } else {
          signupTab.className =
            "flex-1 py-2 text-sm font-semibold bg-blue-600 text-white cursor-pointer";
          signinTab.className =
            "flex-1 py-2 text-sm font-semibold bg-white text-gray-500 cursor-pointer";
          btnText.textContent = "Sign Up";
        }
      }

      // Attach tab listeners correctly
      document
        .getElementById("signinTab")
        .addEventListener("click", () => switchTab("signin"));
      document
        .getElementById("signupTab")
        .addEventListener("click", () => switchTab("signup"));

      function togglePass() {
        const p = document.getElementById("password");
        const visibility = document.getElementById("visibility");
        p.type = p.type === "password" ? "text" : "password";
        if (p.type === "text") {
          visibility.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-eye-off"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10.585 10.587a2 2 0 0 0 2.829 2.828"/><path d="M16.681 16.673a8.717 8.717 0 0 1 -4.681 1.327c-3.6 0 -6.6 -2 -9 -6c1.272 -2.12 2.712 -3.678 4.32 -4.674m2.86 -1.146a9.055 9.055 0 0 1 1.82 -.18c3.6 0 6.6 2 9 6c-.666 1.11 -1.379 2.067 -2.138 2.87"/><path d="M3 3l18 18"/></svg>`;
        } else {
          visibility.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-eye"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"/><path d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6"/></svg>`;
        }
      }

      function showError(msg) {
        const err = document.getElementById("errorMsg");
        err.textContent = msg;
        err.classList.remove("hidden");
      }

      const submitBtn = document.getElementById("submitBtn");
      const btnText = document.getElementById("btnText");

      submitBtn.addEventListener("click", handleSubmit);

      async function handleSubmit() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        document.getElementById("errorMsg").classList.add("hidden");

        if (!username) return showError("Username is required");
        if (!password) return showError("Password is required");
        if (mode === "signup" && password.length < 6)
          return showError("Password minimum 6 characters");

        try {
          btnText.textContent = "Please wait...";
          submitBtn.disabled = true;
          if (mode === "signin") {
            await signin(username, password);
          } else {
            await signup(username, password);
          }
        } catch (err) {
          showError(err.message || "Something went wrong");
        } finally {
          btnText.textContent = mode === "signin" ? "Sign In" : "Sign Up";
          submitBtn.disabled = false;
        }
      }

      document.addEventListener("keypress", function (event) {
        if (event.key === "Enter") handleSubmit();
      });
    </script>
  </body>
</html>
